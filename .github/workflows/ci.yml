name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete,taplo-cli

      - name: cargo fmt --check
        id: fmt
        continue-on-error: true
        run: |
          start=$SECONDS
          cargo fmt --all -- --check && code=0 || code=$?
          echo "duration=$((SECONDS - start))" >> "$GITHUB_OUTPUT"
          exit $code

      - name: taplo fmt --check
        id: taplo
        continue-on-error: true
        run: |
          start=$SECONDS
          taplo fmt --check --diff && code=0 || code=$?
          echo "duration=$((SECONDS - start))" >> "$GITHUB_OUTPUT"
          exit $code

      - name: cargo clippy
        id: clippy
        continue-on-error: true
        run: |
          start=$SECONDS
          cargo clippy --workspace --all-targets -- -D warnings && code=0 || code=$?
          echo "duration=$((SECONDS - start))" >> "$GITHUB_OUTPUT"
          exit $code

      - name: cargo check
        id: check
        continue-on-error: true
        run: |
          start=$SECONDS
          cargo check --workspace --all-targets && code=0 || code=$?
          echo "duration=$((SECONDS - start))" >> "$GITHUB_OUTPUT"
          exit $code

      - name: cargo machete
        id: machete
        continue-on-error: true
        run: |
          start=$SECONDS
          cargo machete && code=0 || code=$?
          echo "duration=$((SECONDS - start))" >> "$GITHUB_OUTPUT"
          exit $code

      - name: cargo test
        id: test
        continue-on-error: true
        run: |
          start=$SECONDS
          cargo test --workspace --all-targets && code=0 || code=$?
          echo "duration=$((SECONDS - start))" >> "$GITHUB_OUTPUT"
          exit $code

      - name: format parse
        id: fmtparse
        continue-on-error: true
        run: |
          start=$SECONDS
          # Parse-rate metric (replaces the former corpus binary): build the CLI
          # once, then format every example/*.sc and count parse failures. This
          # is a metric, not a gate — it always succeeds, and a few known
          # upstream syntax errors are expected. The real parse/format gate is
          # the round-trip test under `cargo test`.
          cargo build -q -p scarpet-cli
          bin=target/debug/scarpet-cli
          total=0
          failed=0
          while IFS= read -r -d '' f; do
            total=$((total + 1))
            if ! "$bin" format "$f" > /dev/null 2>&1; then
              failed=$((failed + 1))
              echo "parse failed: ${f#example/}"
            fi
          done < <(find example -name '*.sc' -print0)
          echo "parsed $((total - failed))/$total files ($failed failed)"
          echo "duration=$((SECONDS - start))" >> "$GITHUB_OUTPUT"
          # metric, not a gate — always succeed
          exit 0

      - name: Write summary
        if: always()
        run: |
          status() {
            case "$1" in
              success) echo "✅ pass" ;;
              failure) echo "❌ fail" ;;
              skipped) echo "⏭️ skipped" ;;
              *)       echo "⚠️ $1" ;;
            esac
          }
          dur() {
            if [ -z "$1" ]; then echo "—"; return; fi
            if [ "$1" -ge 60 ]; then printf '%dm%02ds' $(($1 / 60)) $(($1 % 60)); else printf '%ds' "$1"; fi
          }
          {
            echo "## Quality results"
            echo ""
            echo "| Step | Result | Time |"
            echo "| --- | --- | --- |"
            echo "| cargo fmt --check | $(status '${{ steps.fmt.outcome }}') | $(dur '${{ steps.fmt.outputs.duration }}') |"
            echo "| taplo fmt --check | $(status '${{ steps.taplo.outcome }}') | $(dur '${{ steps.taplo.outputs.duration }}') |"
            echo "| cargo clippy | $(status '${{ steps.clippy.outcome }}') | $(dur '${{ steps.clippy.outputs.duration }}') |"
            echo "| cargo check | $(status '${{ steps.check.outcome }}') | $(dur '${{ steps.check.outputs.duration }}') |"
            echo "| cargo machete | $(status '${{ steps.machete.outcome }}') | $(dur '${{ steps.machete.outputs.duration }}') |"
            echo "| cargo test | $(status '${{ steps.test.outcome }}') | $(dur '${{ steps.test.outputs.duration }}') |"
            echo "| format parse | $(status '${{ steps.fmtparse.outcome }}') | $(dur '${{ steps.fmtparse.outputs.duration }}') |"
          } | tee -a "$GITHUB_STEP_SUMMARY" summary.md

      - name: Upload summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: ci-summary-1-quality
          path: summary.md
          if-no-files-found: error

      - name: Fail job if any step failed
        if: >-
          steps.fmt.outcome != 'success' ||
          steps.taplo.outcome != 'success' ||
          steps.clippy.outcome != 'success' ||
          steps.check.outcome != 'success' ||
          steps.machete.outcome != 'success' ||
          steps.test.outcome != 'success'
        run: exit 1

  build:
    name: Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            target: x86_64-unknown-linux-gnu
            args: --workspace --all-targets
          - name: wasm
            target: wasm32-unknown-unknown
            args: -p scarpet-syntax --lib
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: cargo build
        id: build
        run: |
          start=$SECONDS
          cargo build --target ${{ matrix.target }} ${{ matrix.args }} && code=0 || code=$?
          echo "duration=$((SECONDS - start))" >> "$GITHUB_OUTPUT"
          exit $code

      - name: Write summary
        if: always()
        run: |
          dur() {
            if [ -z "$1" ]; then echo "—"; return; fi
            if [ "$1" -ge 60 ]; then printf '%dm%02ds' $(($1 / 60)) $(($1 % 60)); else printf '%ds' "$1"; fi
          }
          {
            echo "## Build: ${{ matrix.name }} (\`${{ matrix.target }}\`)"
            echo ""
            echo "- Command: \`cargo build --target ${{ matrix.target }} ${{ matrix.args }}\`"
            echo "- Result: **${{ steps.build.outcome }}** ($(dur '${{ steps.build.outputs.duration }}'))"
          } | tee -a "$GITHUB_STEP_SUMMARY" summary.md

      - name: Upload summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: ci-summary-2-build-${{ matrix.name }}
          path: summary.md
          if-no-files-found: error

  comment:
    name: PR summary comment
    needs: [quality, build]
    if: >-
      !cancelled() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download summaries
        uses: actions/download-artifact@v8
        with:
          pattern: ci-summary-*
          path: summaries

      - name: Combine summaries
        run: |
          shopt -s nullglob
          {
            echo "# CI summary"
            echo ""
            for dir in $(printf '%s\n' summaries/ci-summary-* | sort); do
              cat "$dir/summary.md"
              echo ""
            done
            echo "<sub>Updated for ${{ github.event.pull_request.head.sha }}</sub>"
          } > combined.md
          cat combined.md

      - name: Post or update PR comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: ci-summary
          path: combined.md
