[workspace]
resolver = "3"
members = ["scarpet-cli", "scarpet-fmt", "scarpet-playground", "scarpet-syntax"]

[workspace.dependencies]
ariadne = { version = "0.6", features = ["auto-color"] }
clap = { version = "4.6.1", features = ["derive"] }
chumsky = { version = "0.11" }
logos = { version = "0.16.1" }
logosky = { version = "0.2" }
rustyline = { version = "18" }
similar = { version = "2" }
scarpet-fmt = { path = "./scarpet-fmt" }
scarpet-syntax = { path = "./scarpet-syntax" }
serde = { version = "1", features = ["derive"] }
toml = { version = "1" }
